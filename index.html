<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Recipes</title>
  <style>
    :root {
      --bg: #f6f4f1;
      --card: #ffffff;
      --text: #22201d;
      --muted: #6f6a63;
      --line: #e9e3dc;
      --accent: #c66b4e;
      --chip: #f7efe8;
      --shadow: 0 12px 30px rgba(43,33,24,.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #f8f6f3 0%, #f3efe9 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .app { max-width: 1100px; margin: 0 auto; padding: 36px 20px 60px; }

    /* Header */
    .header { margin-bottom: 32px; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--chip); color: var(--accent);
      border: 1px solid #f0ded3; padding: 7px 14px;
      border-radius: 999px; font-size: 13px; font-weight: 600;
      margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: -.03em; line-height: 1.05;
      margin-bottom: 8px;
    }
    .subtitle { font-size: 16px; color: var(--muted); }

    /* Search & Filters */
    .controls {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    #search {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fcfaf7;
      color: var(--text);
      outline: none;
      margin-bottom: 14px;
    }
    #search:focus { border-color: var(--accent); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      padding: 6px 14px; font-size: 13px; font-weight: 500;
      border: 1px solid var(--line); border-radius: 999px;
      background: #fcfaf7; color: var(--muted);
      cursor: pointer; transition: all 0.15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Count */
    .count { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .card-body { flex: 1; }
    .card-tag {
      display: inline-block; font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 999px; margin-bottom: 10px;
      border: 1px solid transparent;
    }
.tag-chicken          { background: #e8f0f7; color: #1a4a6e; border-color: #c5d8ec; }
.tag-chicken::before          { content: '🍗 '; }
.tag-beef             { background: #f7efe8; color: #8a4a2f; border-color: #f0ded3; }
.tag-beef::before             { content: '🥩 '; }
.tag-pork             { background: #fbeaf0; color: #72243e; border-color: #f5ccd9; }
.tag-pork::before             { content: '🐷 '; }
.tag-lamb             { background: #f7efe8; color: #854f0b; border-color: #f0ded3; }
.tag-lamb::before             { content: '🐑 '; }
.tag-seafood          { background: #e1f5ee; color: #0f6e56; border-color: #b2e4d4; }
.tag-seafood::before          { content: '🐟 '; }
.tag-vegetarian       { background: #eaf3de; color: #3b6d11; border-color: #c5dfa8; }
.tag-vegetarian::before       { content: '🥦 '; }
.tag-vegan            { background: #eaf3de; color: #27500a; border-color: #c5dfa8; }
.tag-vegan::before            { content: '🌱 '; }
.tag-egg              { background: #faeeda; color: #854f0b; border-color: #f5dfa0; }
.tag-egg::before              { content: '🥚 '; }
.tag-tofu             { background: #eeedfe; color: #3c3489; border-color: #cccaf7; }
.tag-tofu::before             { content: '🫘 '; }
.tag-turkey           { background: #f7efe8; color: #8a4a2f; border-color: #f0ded3; }
.tag-turkey::before           { content: '🦃 '; }
.tag-leftover-chicken { background: #f0ede8; color: #5c4a32; border-color: #ddd6cc; }
.tag-leftover-chicken::before { content: '♻️ '; }
    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .card-meta { font-size: 13px; color: var(--muted); }
    .card-badges {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 10px;
    }
    .cook-count {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600;
      color: var(--accent); background: var(--chip);
      border: 1px solid #f0ded3; padding: 4px 10px;
      border-radius: 999px;
    }
    .pin-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600;
      color: var(--accent); background: var(--chip);
      border: 1px solid #f0ded3; padding: 4px 10px;
      border-radius: 999px;
    }
    .card-pinned {
      background: linear-gradient(160deg, #fff 70%, #fef6f1 100%);
      border-color: #f0ded3;
    }
    .section-header {
      grid-column: 1 / -1;
      font-size: 12px; font-weight: 600;
      color: var(--muted); letter-spacing: .06em;
      text-transform: uppercase;
      padding: 8px 2px 4px;
    }

    .sort-row {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; margin-top: 12px;
      padding-top: 12px; border-top: 1px solid var(--line);
    }
    .sort-label {
      font-size: 13px; color: var(--muted);
      font-weight: 500; margin-right: 2px;
    }
    .empty {
      grid-column: 1 / -1; text-align: center;
      padding: 60px 20px; color: var(--muted); font-size: 15px;
    }

    @media (max-width: 600px) {
      .app { padding: 20px 14px 40px; }
      .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="header">
      <div class="eyebrow">🍴 Recipe Collection</div>
      <h1>My Recipes</h1>
      <p class="subtitle">Home-cooked favourites, all in one place.</p>
    </div>

    <div class="controls">
      <input id="search" type="text" placeholder="Search by recipe name or ingredient…" oninput="render()" />
      <p id="search-hint" style="font-size:12px;color:var(--muted);margin-top:6px;margin-bottom:0;display:none;">
        🔍 Searching ingredients
      </p>

      <div class="filters" id="filters"></div>
      <div class="sort-row">
        <span class="sort-label">Sort by</span>
        <span class="chip active" id="sort-cooked-desc" onclick="setSort('cooked-desc')">Most cooked ↓</span>
        <span class="chip" id="sort-cooked-asc" onclick="setSort('cooked-asc')">Least cooked ↑</span>
        <span class="chip" id="sort-cals-asc" onclick="setSort('cals-asc')">Calories ↑</span>
        <span class="chip" id="sort-cals-desc" onclick="setSort('cals-desc')">Calories ↓</span>
      </div>
    </div>

    <p class="count" id="count"></p>
    <div class="grid" id="grid"></div>
  </main>

  <script>
    // ============================================================

const recipes = [

    ingredients: ["chicken breast", "chicken stock"] },

    ingredients: ["ground beef", "diced tomatoes", "passata"] },

    ingredients: ["falafel", "jasmine rice", "red cabbage", "carrot", "red onion", "ajvar", "Greek yogurt", "cucumber"] },
  { title: "Ajvar Pork Meatball Pitas", file: "ajvar-pork-meatball-pitas.html", protein: "pork", time: "30 mins", serves: 2, cals: 700,
    ingredients: ["pork mince", "ajvar", "Greek yogurt", "green cabbage", "carrot", "pita bread"] },
  { title: "Crumbed Fish Fillet Wraps", file: "crumbed-fish-fillet-wraps.html", protein: "seafood", time: "20 mins", serves: 2, cals: 535,
    ingredients: ["crumbed fish fillets", "iceberg lettuce", "red onion", "dill"] },
];

    const allTags = ["all", ...new Set(recipes.map(r => r.protein))];
    let activeTag = "all";
    let activeSort = "cooked-desc";
    let cookCounts = {};
    let pinnedFiles = new Set();

    function setSort(s) {
      activeSort = s;
      ["cooked-desc","cooked-asc","cals-asc","cals-desc"].forEach(id => {
        document.getElementById("sort-" + id).classList.toggle("active", id === s);
      });
      render();
    }

    function renderFilters() {
      document.getElementById("filters").innerHTML = allTags.map(t =>
        `<span class="chip${activeTag === t ? " active" : ""}" onclick="setTag('${t}')">
          ${t.charAt(0).toUpperCase() + t.slice(1)}
        </span>`
      ).join("");
    }

    function setTag(t) { activeTag = t; renderFilters(); render(); }

    function cardHtml(r, isPinned) {
      const count = cookCounts[r.file] || 0;
      const cookBadge = count > 0 ? `<span class="cook-count">🍳 ${count}</span>` : "";
      const pinBadge = isPinned ? `<span class="pin-badge">📌 This week</span>` : "";
      const badges = (cookBadge || pinBadge) ? `<div class="card-badges">${cookBadge}${pinBadge}</div>` : "";
      return `
        <a class="card${isPinned ? " card-pinned" : ""}" href="recipe_htmls/${r.file}">
          <div class="card-body">
            <span class="card-tag tag-${r.protein}">${r.protein}</span>
            <p class="card-title">${r.title}</p>
            <p class="card-meta">${r.time} &nbsp;·&nbsp; ${r.serves} serves &nbsp;·&nbsp; ${r.cals} kcal</p>
          </div>
          ${badges}
        </a>`;
    }

    function render() {
      const q = document.getElementById("search").value.toLowerCase().trim();
      const hint = document.getElementById("search-hint");

      const anyTitleMatch = q && recipes.some(r => r.title.toLowerCase().includes(q));
      hint.style.display = (q && !anyTitleMatch) ? "block" : "none";

      const filtered = recipes.filter(r => {
        const matchTitle = r.title.toLowerCase().includes(q);
        const matchIngredient = (r.ingredients || []).some(i => i.toLowerCase().includes(q));
        const matchQ = !q || matchTitle || matchIngredient;
        const matchT = activeTag === "all" || r.protein === activeTag;
        return matchQ && matchT;
      });
      if (activeSort === "cals-asc") filtered.sort((a, b) => a.cals - b.cals);
      else if (activeSort === "cals-desc") filtered.sort((a, b) => b.cals - a.cals);
      else if (activeSort === "cooked-desc") filtered.sort((a, b) => (cookCounts[b.file] || 0) - (cookCounts[a.file] || 0));
      else if (activeSort === "cooked-asc") filtered.sort((a, b) => (cookCounts[a.file] || 0) - (cookCounts[b.file] || 0));

      document.getElementById("count").textContent =
        filtered.length + " recipe" + (filtered.length !== 1 ? "s" : "");

      if (!filtered.length) {
        document.getElementById("grid").innerHTML = `<div class="empty">No recipes found. Try a different search.</div>`;
        return;
      }

      const pinned   = filtered.filter(r =>  pinnedFiles.has(r.file));
      const unpinned = filtered.filter(r => !pinnedFiles.has(r.file));

      let html = "";
      if (pinned.length > 0) {
        html += `<div class="section-header">📌 This week</div>`;
        html += pinned.map(r => cardHtml(r, true)).join("");
      }
      if (unpinned.length > 0) {
        if (pinned.length > 0) html += `<div class="section-header">All recipes</div>`;
        html += unpinned.map(r => cardHtml(r, false)).join("");
      }

      document.getElementById("grid").innerHTML = html;
    }

    renderFilters();
    render();

    // Fetch cook counts from Google Sheets
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQfwQp96tJdcpTwgRxY-z8AbNH6IVQ3toQisDCWAy-7AFx0yaERVwfsCHpv1zKKLTjN6RrFQGzw4Kxr/pub?gid=0&single=true&output=csv";

    fetch(CSV_URL)
      .then(r => r.text())
      .then(csv => {
        const rows = csv.trim().split("\n").slice(1); // skip header
        rows.forEach(row => {
          // Extract the URL from the row (second column)
          const cols = row.split(",");
          const url = cols[1] ? cols[1].trim().replace(/"/g, "") : "";
          // Extract just the filename from the URL
          const filename = url.split("/").pop();
          if (filename) {
            cookCounts[filename] = (cookCounts[filename] || 0) + 1;
          }
        });
        render(); // re-render cards with cook counts
      })
      .catch(err => console.warn("Could not load cook counts:", err));

    // Fetch pinned recipes from the Pin tab
    const PIN_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQfwQp96tJdcpTwgRxY-z8AbNH6IVQ3toQisDCWAy-7AFx0yaERVwfsCHpv1zKKLTjN6RrFQGzw4Kxr/pub?gid=1218956679&single=true&output=csv";

    fetch(PIN_CSV_URL)
      .then(r => r.text())
      .then(csv => {
        const rows = csv.trim().split("\n").slice(1); // skip "Link" header
        rows.forEach(row => {
          const url = row.trim().replace(/"/g, "");
          const filename = url.split("/").pop();
          if (filename) pinnedFiles.add(filename);
        });
        render();
      })
      .catch(err => console.warn("Could not load pinned recipes:", err));
  </script>
</body>
</html>
