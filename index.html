<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Recipes</title>
  <style>
    :root {
      --bg: #f6f4f1;
      --card: #ffffff;
      --text: #22201d;
      --muted: #6f6a63;
      --line: #e9e3dc;
      --accent: #c66b4e;
      --chip: #f7efe8;
      --shadow: 0 12px 30px rgba(43,33,24,.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #f8f6f3 0%, #f3efe9 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .app { max-width: 1100px; margin: 0 auto; padding: 36px 20px 60px; }

    /* Header */
    .header { margin-bottom: 32px; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--chip); color: var(--accent);
      border: 1px solid #f0ded3; padding: 7px 14px;
      border-radius: 999px; font-size: 13px; font-weight: 600;
      margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: -.03em; line-height: 1.05;
      margin-bottom: 8px;
    }
    .subtitle { font-size: 16px; color: var(--muted); }

    /* Search & Filters */
    .controls {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    #search {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fcfaf7;
      color: var(--text);
      outline: none;
      margin-bottom: 14px;
    }
    #search:focus { border-color: var(--accent); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      padding: 6px 14px; font-size: 13px; font-weight: 500;
      border: 1px solid var(--line); border-radius: 999px;
      background: #fcfaf7; color: var(--muted);
      cursor: pointer; transition: all 0.15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Count */
    .count { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .card-body { flex: 1; }
    .card-tag {
      display: inline-block; font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 999px; margin-bottom: 10px;
      border: 1px solid transparent;
    }
.tag-chicken          { background: #e8f0f7; color: #1a4a6e; border-color: #c5d8ec; }
.tag-chicken::before          { content: '🍗 '; }
.tag-beef             { background: #f7efe8; color: #8a4a2f; border-color: #f0ded3; }
.tag-beef::before             { content: '🥩 '; }
.tag-pork             { background: #fbeaf0; color: #72243e; border-color: #f5ccd9; }
.tag-pork::before             { content: '🐷 '; }
.tag-lamb             { background: #f7efe8; color: #854f0b; border-color: #f0ded3; }
.tag-lamb::before             { content: '🐑 '; }
.tag-seafood          { background: #e1f5ee; color: #0f6e56; border-color: #b2e4d4; }
.tag-seafood::before          { content: '🐟 '; }
.tag-vegetarian       { background: #eaf3de; color: #3b6d11; border-color: #c5dfa8; }
.tag-vegetarian::before       { content: '🥦 '; }
.tag-vegan            { background: #eaf3de; color: #27500a; border-color: #c5dfa8; }
.tag-vegan::before            { content: '🌱 '; }
.tag-egg              { background: #faeeda; color: #854f0b; border-color: #f5dfa0; }
.tag-egg::before              { content: '🥚 '; }
.tag-tofu             { background: #eeedfe; color: #3c3489; border-color: #cccaf7; }
.tag-tofu::before             { content: '🫘 '; }
.tag-turkey           { background: #f7efe8; color: #8a4a2f; border-color: #f0ded3; }
.tag-turkey::before           { content: '🦃 '; }
.tag-leftover-chicken { background: #f0ede8; color: #5c4a32; border-color: #ddd6cc; }
.tag-leftover-chicken::before { content: '♻️ '; }
    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .card-meta { font-size: 13px; color: var(--muted); }
    .cook-count {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 10px;
      font-size: 12px; font-weight: 600;
      color: var(--accent); background: var(--chip);
      border: 1px solid #f0ded3; padding: 4px 10px;
      border-radius: 999px;
      align-self: flex-start;
    }

    .sort-row {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; margin-top: 12px;
      padding-top: 12px; border-top: 1px solid var(--line);
    }
    .sort-label {
      font-size: 13px; color: var(--muted);
      font-weight: 500; margin-right: 2px;
    }
    .empty {
      grid-column: 1 / -1; text-align: center;
      padding: 60px 20px; color: var(--muted); font-size: 15px;
    }

    @media (max-width: 600px) {
      .app { padding: 20px 14px 40px; }
      .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="header">
      <div class="eyebrow">🍴 Recipe Collection</div>
      <h1>My Recipes</h1>
      <p class="subtitle">Home-cooked favourites, all in one place.</p>
    </div>

    <div class="controls">
      <input id="search" type="text" placeholder="Search recipes..." oninput="render()" />

      <div class="filters" id="filters"></div>
      <div class="sort-row">
        <span class="sort-label">Sort by</span>
        <span class="chip active" id="sort-cooked-desc" onclick="setSort('cooked-desc')">Most cooked ↓</span>
        <span class="chip" id="sort-cooked-asc" onclick="setSort('cooked-asc')">Least cooked ↑</span>
        <span class="chip" id="sort-cals-asc" onclick="setSort('cals-asc')">Calories ↑</span>
        <span class="chip" id="sort-cals-desc" onclick="setSort('cals-desc')">Calories ↓</span>
      </div>
    </div>

    <p class="count" id="count"></p>
    <div class="grid" id="grid"></div>
  </main>

  <script>
    // ============================================================
    // ADD YOUR RECIPES HERE
    // Each recipe needs:
    //   title   — display name
    //   file    — filename inside recipe_htmls/ folder
    //   protein — main protein (chicken, beef, pork, lamb, seafood,
    //             vegetarian, vegan, egg, tofu, turkey)
    //   time    — cook time as a string
    //   serves  — number of servings
    //   cals    — calories per serve
    // ============================================================
    const recipes = [
      { title: "One Pan Butter Chicken", file: "one_pan_butter_chicken.html", protein: "chicken", time: "2 hr 30 min", serves: 4, cals: 750 },  
      { title: "Spicy Thai Coconut Meatballs", file: "spicy_thai_coconut_meatballs.html", protein: "pork", time: "35 min", serves: 4, cals: 540 },
      { title: "Spicy Harissa Meatballs", file: "spicy_harissa_meatballs.html", protein: "beef", time: "45 min", serves: 4, cals: 495 },
      { title: "Gochujang & Coconut Chicken", file: "gochujang_coconut_chicken.html", protein: "chicken", time: "30 min", serves: 2, cals: 615 },
      { title: "Coconut & Lime Baked Cod", file: "coconut_lime_baked_cod.html", protein: "seafood", time: "35 min", serves: 2, cals: 640 },
      { title: "Creamy Garlic & Herb Orzo with Chicken Thighs", file: "creamy_garlic_herb_orzo_chicken.html", protein: "chicken", time: "35 min", serves: 2, cals: 750 },
      { title: "Coconut & Harissa Chicken Thighs", file: "coconut_harissa_chicken_thighs.html", protein: "chicken", time: "35 min", serves: 2, cals: 630 },
      { title: "Chicken Mayo Sandwich", file: "chicken_mayo_sandwich.html", protein: "leftover-chicken", time: "10 min", serves: 1, cals: 0 },
      { title: "Peanutty Coconutty Noodles with Crispy Chicken", file: "peanutty_coconutty_noodles.html", protein: "leftover-chicken", time: "25 min", serves: 2, cals: 690 },
      { title: "One Pot Chicken & Rice Burritos", file: "one_pot_chicken_rice_burrito.html", protein: "chicken", time: "50 min", serves: 2, cals: 700 },
      { title: "Sheet Pan Adana Kebabs with Cacik & Sumac Onion Salad", file: "adana_kebabs_cacik_sumac_salad.html", protein: "lamb", time: "30 min", serves: 2, cals: 755 },
      { title: "High Protein Burger", file: "high_protein_burger.html", protein: "beef", time: "15 min", serves: 1, cals: 514 },
      { title: "Bang-Bang Inspired Rice Noodle Salad", file: "bang_bang_rice_noodle_salad.html", protein: "chicken", time: "20 min", serves: 2, cals: 510 },
      { title: "Bang Bang Shrimp", file: "bang_bang_shrimp.html", protein: "seafood", time: "40 min", serves: 2, cals: 435 },
      { title: "Honey Lemon Garlic Chicken", file: "honey_lemon_garlic_chicken.html", protein: "chicken", time: "30 min", serves: 2, cals: 515 },
      { title: "Sweet & Savory Chicken with Spicy Carbonara Brothy Rice", file: "sweet_savory_chicken_carbonara_brothy_rice.html", protein: "chicken", time: "40 min", serves: 2, cals: 465 },
      { title: "Thai Beef Salad", file: "thai_beef_salad.html", protein: "beef", time: "20 min", serves: 2, cals: 350 },
      { title: "Prawn Chipotle Bowls", file: "prawn_chipotle_bowls.html", protein: "seafood", time: "20 min", serves: 2, cals: 570 },
      { title: "Curried Thai Beef with Peanut Sauce", file: "curried_thai_beef_peanut_sauce.html", protein: "beef", time: "20 min", serves: 2, cals: 450 },
      { title: "Rosemary Chicken Meatballs & Tomato Orzo", file: "rosemary-chicken-meatballs-tomato-orzo.html", protein: "chicken", time: "45 mins", serves: 2, cals: 680 },
      { title: "Vietnamese Caramelized Pork Bowls", file: "vietnamese-caramelized-pork-bowls.html", protein: "pork", time: "25 mins", serves: 2, cals: 590 },
      { title: "Sticky Chicken & Broccoli Bowls with Spicy Mayo", file: "sticky-chicken-bowls.html", protein: "chicken", time: "40 mins", serves: 2, cals: 720 },
      { title: "Vietnamese Lemongrass Chicken", file: "vietnamese-lemongrass-chicken.html", protein: "chicken", time: "20 mins", serves: 2, cals: 420 },
      { title: "Creamy Coconut Prawn Curry with Jasmine Rice", file: "creamy-coconut-prawn-curry.html", protein: "seafood", time: "45 mins", serves: 2, cals: 680 },
      { title: "Caramelized Soy Chicken in Garlic Ginger Broth with Rice", file: "caramelized-soy-chicken-broth.html", protein: "chicken", time: "45 mins", serves: 2, cals: 650 },
      { title: "Thai Sweet Chilli Beef Bowls", file: "thai-sweet-chilli-beef-bowls.html", protein: "beef", time: "20 mins", serves: 2, cals: 580 },
      { title: "Ground Beef Enchiladas", file: "ground-beef-enchiladas.html", protein: "beef", time: "40 mins", serves: 2, cals: 680 },
      
      
      // { title: "Pasta Carbonara", file: "pasta_carbonara.html", protein: "egg", time: "30 min", serves: 2, cals: 620 },
      // { title: "Prawn Tacos", file: "prawn_tacos.html", protein: "seafood", time: "20 min", serves: 3, cals: 410 },
    ];

    const allTags = ["all", ...new Set(recipes.map(r => r.protein))];
    let activeTag = "all";
    let activeSort = "cooked-desc";
    let cookCounts = {};

    function setSort(s) {
      activeSort = s;
      ["cooked-desc","cooked-asc","cals-asc","cals-desc"].forEach(id => {
        document.getElementById("sort-" + id).classList.toggle("active", id === s);
      });
      render();
    }

    function renderFilters() {
      document.getElementById("filters").innerHTML = allTags.map(t =>
        `<span class="chip${activeTag === t ? " active" : ""}" onclick="setTag('${t}')">
          ${t.charAt(0).toUpperCase() + t.slice(1)}
        </span>`
      ).join("");
    }

    function setTag(t) { activeTag = t; renderFilters(); render(); }

    function render() {
      const q = document.getElementById("search").value.toLowerCase();
      const filtered = recipes.filter(r => {
        const matchQ = !q || r.title.toLowerCase().includes(q);
        const matchT = activeTag === "all" || r.protein === activeTag;
        return matchQ && matchT;
      });
      if (activeSort === "cals-asc") filtered.sort((a, b) => a.cals - b.cals);
      else if (activeSort === "cals-desc") filtered.sort((a, b) => b.cals - a.cals);
      else if (activeSort === "cooked-desc") filtered.sort((a, b) => (cookCounts[b.file] || 0) - (cookCounts[a.file] || 0));
      else if (activeSort === "cooked-asc") filtered.sort((a, b) => (cookCounts[a.file] || 0) - (cookCounts[b.file] || 0));
      document.getElementById("count").textContent =
        filtered.length + " recipe" + (filtered.length !== 1 ? "s" : "");
      document.getElementById("grid").innerHTML = filtered.length
        ? filtered.map(r => {
            const count = cookCounts[r.file] || 0;
            const cookBadge = count > 0
              ? `<span class="cook-count">🍳 ${count}</span>`
              : "";
            return `
            <a class="card" href="recipe_htmls/${r.file}">
              <div class="card-body">
                <span class="card-tag tag-${r.protein}">${r.protein}</span>
                <p class="card-title">${r.title}</p>
                <p class="card-meta">${r.time} &nbsp;·&nbsp; ${r.serves} serves &nbsp;·&nbsp; ${r.cals} kcal</p>
              </div>
              ${cookBadge}
            </a>`;
          }).join("")
        : `<div class="empty">No recipes found. Try a different search.</div>`;
    }

    renderFilters();
    render();

    // Fetch cook counts from Google Sheets
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQfwQp96tJdcpTwgRxY-z8AbNH6IVQ3toQisDCWAy-7AFx0yaERVwfsCHpv1zKKLTjN6RrFQGzw4Kxr/pub?gid=0&single=true&output=csv";

    fetch(CSV_URL)
      .then(r => r.text())
      .then(csv => {
        const rows = csv.trim().split("\n").slice(1); // skip header
        rows.forEach(row => {
          // Extract the URL from the row (second column)
          const cols = row.split(",");
          const url = cols[1] ? cols[1].trim().replace(/"/g, "") : "";
          // Extract just the filename from the URL
          const filename = url.split("/").pop();
          if (filename) {
            cookCounts[filename] = (cookCounts[filename] || 0) + 1;
          }
        });
        render(); // re-render cards with cook counts
      })
      .catch(err => console.warn("Could not load cook counts:", err));
  </script>
</body>
</html>
